name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run ShellCheck
        run: shellcheck create-copilot-toolbox.sh copilot

      - name: Check shell formatting
        run: shfmt -d create-copilot-toolbox.sh copilot
